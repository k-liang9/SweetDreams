exp:
  entity: kliang-personal
  project: sweetdreams
  group: world_model
  run_name: world_model

data:
  h5_path: data/breakout.h5
  seq_len: 16
  train_frac: 0.9
  val_frac: 0.05

tokenizer:
  checkpoint_path: weights/tokenizer.pt

train:
  seed: 0
  epochs: 15
  batch_size: 32
  num_workers: 8
  device: auto
  grad_clip_norm: 1.0
  val_every_steps: 400
  log_every_steps: 20
  tokenize_batch_size: 64

optimizer:
  type: adamw
  lr: 0.0014
  weight_decay: 0.01

scheduler:
  type: none

model:
  num_frame_tokens: 512
  num_actions: 4
  tokens_per_frame: 64
  d_model: 256
  num_layers: 6
  num_heads: 4
  dropout: 0.1
  attention: causal

generate:
  temperature: 1.0
  top_k: 50
  rollout_steps: 32
  greedy: false
  batch_size: 32
  num_samples: 32
  checkpoint_path: weights/world_model.pt
  fps: 15