exp:
  entity: kliang-personal
  project: sweetdreams
  group: vqvae
  run_name: vqvae

data:
  h5_path: data/breakout.h5
  seq_len: 1
  train_frac: 0.9
  val_frac: 0.05

train:
  seed: 0
  epochs: 20
  batch_size: 64
  num_workers: 8
  device: auto
  val_every_steps: 400

optimizer:
  type: adam
  lr: 0.00014

scheduler:
  type: none
  t_max: ${train.epochs}
  eta_min: 0.0

loss:
  perceptual_weight: 0.5
  perceptual_net: vgg
  disc_weight: 0.05
  disc_warmup_steps: 20000
  disc_adaptive: false

discriminator:
  enabled: true
  base_channels: 32
  num_layers: 3
  max_channels: 512
  lr: 0.00014
  beta1: 0.5
  beta2: 0.9

model:
  in_out_channels: 3
  hidden_dim: 256
  latent_dim: 256
  codebook:
    num_embeddings: 512
    commitment_cost: 1
    init:
      type: kmeans
      num_batches: 20
      num_iters: 40
      chunk_size: 65536
    ema:
      decay: 0.99
      eps: 1e-5
      restart_threshold: 0.1
